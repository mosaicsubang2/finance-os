function doImport(){
  const btn = document.getElementById('importBtn');
  btn.disabled = true;
  btn.textContent = '导入中…';

  try {
    // Load existing data
    let existing = {};
    try {
      existing = JSON.parse(localStorage.getItem('fos_data') || '{}');
    } catch(e){}

    const existingTxns = existing.txns || [];
    const existingIds = new Set(existingTxns.map(t => t.id));

    // Merge - skip duplicates
    let added = 0;
    const newTxns = [...MBB_TXNS].reverse(); // oldest first, then prepend
    for(const t of newTxns){
      if(!existingIds.has(t.id)){
        existingTxns.unshift(t);
        added++;
      }
    }

    // Sort by date descending
    existingTxns.sort((a,b) => b.date.localeCompare(a.date));

    existing.txns = existingTxns;

    // Animate progress
    let pct = 0;
    const fill = document.getElementById('fill');
    const iv = setInterval(()=>{
      pct = Math.min(pct + 8, 100);
      fill.style.width = pct + '%';
      if(pct >= 100) clearInterval(iv);
    }, 40);

    localStorage.setItem('fos_data', JSON.stringify(existing));

    setTimeout(()=>{
      document.getElementById('status').innerHTML = `<span class="success">✅ 成功导入 ${added} 笔交易！</span>`;
      btn.textContent = '✅ 导入完成 — 跳转 App…';
      setTimeout(goApp, 1500);
    }, 600);

  } catch(e){
    document.getElementById('status').innerHTML = `<span class="error">❌ 错误: ${e.message}</span>`;
    btn.disabled = false;
    btn.textContent = '重试';
  }
}

function goApp(){
  window.location.href = './';
}
