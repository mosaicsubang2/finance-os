function doImport(){
  const btn = document.getElementById('importBtn');
  btn.disabled = true;
  btn.textContent = '导入中…';

  try {
    let existing = {};
    try { existing = JSON.parse(localStorage.getItem('fos_data') || '{}'); } catch(e){}

    const existingTxns = existing.txns || [];
    const existingIds = new Set(existingTxns.map(t => t.id));

    let added = 0;
    for(const t of [...MBB_TXNS].reverse()){
      if(!existingIds.has(t.id)){
        existingTxns.unshift(t);
        added++;
      }
    }

    existingTxns.sort((a,b) => b.date.localeCompare(a.date));
    existing.txns = existingTxns;

    let pct = 0;
    const fill = document.getElementById('fill');
    const iv = setInterval(()=>{
      pct = Math.min(pct+8, 100);
      fill.style.width = pct+'%';
      if(pct>=100) clearInterval(iv);
    }, 40);

    localStorage.setItem('fos_data', JSON.stringify(existing));

    setTimeout(()=>{
      document.getElementById('status').innerHTML = `<span class="success">✅ 成功导入 ${added} 笔！</span>`;
      btn.textContent = '✅ 完成 — 跳转 App…';
      setTimeout(goApp, 1500);
    }, 600);

  } catch(e){
    document.getElementById('status').innerHTML = `<span class="error">❌ 错误: ${e.message}</span>`;
    btn.disabled = false;
    btn.textContent = '重试';
  }
}

function goApp(){ window.location.href = './'; }
